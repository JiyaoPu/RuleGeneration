$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json

name: rgn_train_component
display_name: RGN Train Component
version: 5
type: command

inputs:
  settings_json:
    type: uri_file

outputs:
  outputs_dir:
    type: uri_folder

code: .

environment: azureml:RGN_Environment:1

command: >-
  python main.py
  --settings_json ${{inputs.settings_json}}
  --outputs_dir ${{outputs.outputs_dir}}